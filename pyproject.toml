[tool.ruff]
line-length = 120
target-version = "py311"
exclude = ["static/dist", ".venv", "build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
  "E501",  # line length — sok long string a generált HTML-ben
  "B008",  # function call in default arg — http.server stílus
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B"]
